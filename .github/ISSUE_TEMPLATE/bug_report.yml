name: "🐛 Bug Report"
description: "Report a bug in SentinelAI"
title: "🐛 [Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Describe the bug clearly and concisely"
      placeholder: "When I try to analyze a contract, the scan fails with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "Detailed steps to reproduce the bug"
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Upload file '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: "Affected Component"
      options:
        - "Web Dashboard"
        - "API Backend"
        - "Scanner Plugin"
        - "AI Engine"
        - "Smart Contracts"
        - "Documentation"
        - "Docker/DevOps"
        - "Other"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "SentinelAI Version"
      description: "Which version are you running?"
      placeholder: "v1.0.0"

  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs"
      description: "Paste any relevant logs or error messages"
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: "Additional Context"
      description: "Add any other context about the problem here"
